# apricot-budget · Nginx config
# Serves the built SPA at / and proxies /api/* to the backend container.
# History mode fallback keeps deep-links (/budget, /actifs…) working on refresh.

# Cache le "Server: nginx/x.y.z" — évite le fingerprinting bête par version.
# S'applique à tous les server{} blocks du process.
server_tokens off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Refuse tous les dotfiles (.git, .env, .htaccess, .DS_Store) — défense
    # en profondeur au cas où quelque chose fuirait dans dist/. L'image
    # frontend ne copie que dist/ donc en principe aucun de ces fichiers
    # n'existe, mais mieux vaut être ceinture + bretelles.
    location ~ /\. {
        deny all;
        return 404;
    }

    # Static files with a long cache — Vite fingerprints filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → backend container. `backend` resolves via docker-compose network.
    location /api/ {
        proxy_pass         http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # CSV uploads may exceed the default 1 Mo body size.
        client_max_body_size 15m;
    }

    # SPA fallback — any non-file, non-/api URL renders index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
